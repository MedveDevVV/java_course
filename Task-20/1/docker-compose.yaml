version: '3.8'

services:
  postgres:
    image: postgres:17.2
    container_name: autoservice-db
    environment:
      POSTGRES_DB: auto_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ramzes22!!
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
        - autoservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: autoservice-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./autoservice.properties:/usr/local/tomcat/autoservice.properties
      - ./database.properties:/usr/local/tomcat/database.properties
    networks:
      - autoservice-network
volumes:
  postgres-data:

networks:
  autoservice-network:
    driver: bridge